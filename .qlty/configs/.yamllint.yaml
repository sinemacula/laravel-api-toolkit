# Materialized from sinemacula/coding-standards (yaml/.yamllint.yaml).
# qlty applies yamllint config from a local file rather than the source at
# runtime, so keep this in sync with the shared standard instead of hand-editing.
rules:
    document-start: disable
    quoted-strings:
        required: only-when-needed
        extra-allowed: [ "{|}" ]
    key-duplicates: { }
    octal-values:
        forbid-implicit-octal: true
